<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1a3a5c">
  <title>CSC Prüf-App</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ===== SCREEN 1: HOME ===== -->
<div id="screen-home" class="screen active">
  <div class="header">
    <div class="logo">CSC</div>
    <div class="header-title">Prüf-App</div>
    <img src="logo.png" class="header-logo" alt="CSC Logo">
  </div>
  <div class="content">
    <div class="welcome-text">Standort wählen oder QR-Code scannen</div>
    <button class="btn-primary btn-qr" onclick="startQRScan()">
      <span class="icon">📷</span> QR-Code scannen
    </button>
    <div class="divider">— oder manuell wählen —</div>
    <div id="standort-liste"></div>
  </div>
</div>

<!-- ===== SCREEN 2: GRUPPEN (Ordner-Ebene) ===== -->
<div id="screen-gruppen" class="screen">
  <div class="header">
    <button class="btn-back" onclick="showScreen('home')">‹ Zurück</button>
    <div class="header-title" id="gruppen-titel">Prüfungen</div>
  </div>
  <div class="content" id="gruppen-liste"></div>
</div>

<!-- ===== SCREEN 3: BEREICHE (innerhalb einer Gruppe) ===== -->
<div id="screen-bereiche" class="screen">
  <div class="header">
    <button class="btn-back" onclick="showScreen('gruppen')">‹ Zurück</button>
    <div class="header-title" id="bereiche-titel">Bereiche</div>
  </div>
  <div class="content" id="bereiche-liste"></div>
</div>

<!-- ===== SCREEN 4: CHECKLISTE ===== -->
<div id="screen-checklist" class="screen">
  <div class="header">
    <button class="btn-back" onclick="showScreen('bereiche')">‹ Zurück</button>
    <div class="header-title" id="checklist-titel">Prüfliste</div>
  </div>
  <div class="content" id="checklist-content">
    <div id="checklist-meta" class="meta-box"></div>
    <div id="checklist-abschnitte"></div>
    <div class="aufzug-nr-box" id="standort-box">
      <label>Standort:</label>
      <input type="text" id="formular-standort" placeholder="z. B. Raschplatz 5, Hannover ...">
    </div>
    <div class="aufzug-nr-box" id="aufzug-nr-box" style="display:none">
      <label>Aufzug-Nr.:</label>
      <input type="text" id="aufzug-nr" placeholder="z. B. 1, 2, A, B ...">
    </div>
    <div class="aufzug-nr-box" id="leiter-felder-box" style="display:none">
      <label>Leiter-Typ / Inventar-Nr.:</label>
      <input type="text" id="leiter-typ" placeholder="z. B. Stehleiter 3m, Anlegeleiter, Inv.-Nr. L-001 ...">
    </div>
    <div class="bemerkung-box">
      <label>Bemerkungen / Mängel:</label>
      <textarea id="bemerkung" rows="3" placeholder="Optional: Mängel oder Hinweise eintragen..."></textarea>
      <div class="foto-bereich">
        <button class="btn-foto" onclick="fotoAufnehmen()">
          <span class="icon">📷</span> Foto aufnehmen
        </button>
        <input type="file" id="foto-input" accept="image/*" capture="environment" style="display:none" onchange="fotoHinzufuegen(event)">
        <div id="foto-vorschau" class="foto-vorschau"></div>
      </div>
    </div>
    <div class="unterschrift-box">
      <label>Unterschrift Prüfer:</label>
      <div id="sig-container">
        <canvas id="sig-canvas"></canvas>
        <button class="btn-secondary btn-sig-clear" onclick="clearSignature()">✕ Löschen</button>
      </div>
    </div>
    <div class="pruefer-box">
      <label>Name Prüfer:</label>
      <input type="text" id="pruefer-name" placeholder="Vor- und Nachname" list="pruefer-liste" autocomplete="off">
      <datalist id="pruefer-liste">
        <option value="Thomas Schmoldt">
        <option value="Tim Schmoldt">
        <option value="Max Mustermann">
      </datalist>
    </div>
    <button class="btn-primary btn-submit" onclick="submitChecklist()">
      <span class="icon">✅</span> Prüfung abschließen &amp; PDF speichern
    </button>
  </div>
</div>

<!-- ===== SCREEN 5: QR SCANNER ===== -->
<div id="screen-qr" class="screen">
  <div class="header">
    <button class="btn-back" onclick="stopQRScan()">‹ Abbrechen</button>
    <div class="header-title">QR-Code scannen</div>
  </div>
  <div class="content qr-content">
    <div id="qr-reader" style="width:100%"></div>
    <p class="qr-hint">Kamera auf den QR-Code am Bereich richten</p>
  </div>
</div>

<!-- ===== SCREEN 6: ERGEBNIS ===== -->
<div id="screen-result" class="screen">
  <div class="header">
    <button class="btn-back" onclick="showScreen('home')">‹ Home</button>
    <div class="header-title">Prüfung abgeschlossen</div>
  </div>
  <div class="content result-content">
    <div class="result-icon" id="result-icon">✅</div>
    <div class="result-text" id="result-text">Prüfung gespeichert!</div>
    <div class="result-sub" id="result-sub"></div>
    <button class="btn-primary" onclick="showScreen('home')">Neue Prüfung</button>
  </div>
</div>

<!-- ===== LOADING OVERLAY ===== -->
<div id="loading" class="loading-overlay hidden">
  <div class="spinner"></div>
  <div class="loading-text">PDF wird erstellt...</div>
</div>

<!-- Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="config.js"></script>
<script src="app.js"></script>
</body>
</html>
